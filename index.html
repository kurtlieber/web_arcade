<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACE INVADERS</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: monospace;
        }
        canvas { 
            border: 4px solid #0f0; 
            box-shadow: 0 0 40px #0f0; 
        }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let gameState = 'start';
        let score = 0;
        let lives = 3;

        const player = { x: 370, y: 520, width: 50, height: 20 };
        let invaders = [];
        let bullets = [];
        let lastMove = 0;
        let dir = 1;

        function initInvaders() {
            invaders = [];
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 11; c++) {
                    invaders.push({
                        x: 80 + c * 55,
                        y: 80 + r * 45,
                        alive: true
                    });
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 800, 600);

            // Stars
            ctx.fillStyle = '#222';
            for (let i = 0; i < 50; i++) {
                ctx.fillRect((i * 31) % 800, (i * 47) % 500, 2, 2);
            }

            if (gameState === 'start') {
                ctx.fillStyle = '#0f0';
                ctx.font = 'bold 42px monospace';
                ctx.fillText('SPACE INVADERS', 200, 220);
                ctx.font = '20px monospace';
                ctx.fillText('Press SPACE to start', 240, 300);
                ctx.fillText('Arrow keys / A D to move', 200, 360);
                ctx.fillText('Space to shoot', 280, 400);
            } 
            else if (gameState === 'playing') {
                // Player
                ctx.fillStyle = '#0ff';
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.fillRect(player.x + 20, player.y - 10, 10, 12);

                // Invaders
                ctx.fillStyle = '#0f0';
                invaders.forEach(inv => {
                    if (inv.alive) {
                        ctx.fillRect(inv.x, inv.y, 36, 28);
                        // Simple eyes
                        ctx.fillStyle = '#000';
                        ctx.fillRect(inv.x + 8, inv.y + 8, 6, 6);
                        ctx.fillRect(inv.x + 22, inv.y + 8, 6, 6);
                        ctx.fillStyle = '#0f0';
                    }
                });

                // Bullets
                ctx.fillStyle = '#fff';
                bullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 12));

                // UI
                ctx.fillStyle = '#0f0';
                ctx.font = '18px monospace';
                ctx.fillText('SCORE: ' + score.toString().padStart(5, '0'), 40, 40);
                ctx.fillText('LIVES: ' + lives, 650, 40);
            }
        }

        function update() {
            if (gameState !== 'playing') return;

            // Move invaders
            const now = Date.now();
            if (now - lastMove > 350) {
                let hitWall = false;
                
                invaders.forEach(inv => {
                    if (inv.alive) {
                        inv.x += dir * 10;
                        if (inv.x < 20 || inv.x > 740) hitWall = true;
                    }
                });

                if (hitWall) {
                    dir *= -1;
                    invaders.forEach(inv => {
                        if (inv.alive) inv.y += 22;
                    });
                }
                lastMove = now;
            }

            // Move bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= 14;
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }

            // Collisions
            for (let i = 0; i < invaders.length; i++) {
                const inv = invaders[i];
                if (!inv.alive) continue;

                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (b.x > inv.x && b.x < inv.x + 36 && 
                        b.y > inv.y && b.y < inv.y + 28) {
                        inv.alive = false;
                        bullets.splice(j, 1);
                        score += 10;
                        break;
                    }
                }
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function shoot() {
            bullets.push({ x: player.x + 23, y: player.y - 5 });
        }

        // Controls
        document.addEventListener('keydown', e => {
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                
                if (gameState === 'start') {
                    gameState = 'playing';
                    initInvaders();
                    lastMove = Date.now();
                } else if (gameState === 'playing') {
                    shoot();
                }
            }

            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && gameState === 'playing') {
                player.x -= 18;
            }
            if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && gameState === 'playing') {
                player.x += 18;
            }
            
            player.x = Math.max(0, Math.min(750, player.x));
        });

        // Boot
        initInvaders();
        draw();
        gameLoop();

        console.log('%c[Space Invaders] Game loaded successfully', 'color:#0f0');
    </script>
</body>
</html>
