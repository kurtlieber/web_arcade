<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACE INVADERS • 1978</title>
    <style>
        body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; }
        canvas { border: 3px solid #0f0; box-shadow: 0 0 30px #0f0; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let gameState = 'start';
        let score = 0;
        let lives = 3;

        const player = { x: 370, y: 515, width: 40, height: 18 };
        let invaders = [];
        let bullets = [];
        let bunkers = [];
        let ufo = null;

        let lastMove = 0;
        let lastUfoSpawn = 0;
        let dir = 1;
        let animFrame = 0;
        let ufoScoreIndex = 0;
        const ufoScores = [50, 100, 150, 300];

        let audioCtx;
        let ufoOsc = null;
        let ufoGain = null;
        let marchInterval = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // === MARCHING MUSIC (4-note tune) ===
        function playMarchSound() {
            initAudio();
            
            const notes = [120, 160, 200, 240]; // Classic 4-note march
            let noteIndex = 0;

            const playNote = () => {
                if (gameState !== 'playing') return;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.value = notes[noteIndex];
                gain.gain.value = 0.12;

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();

                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                osc.stop(audioCtx.currentTime + 0.1);

                noteIndex = (noteIndex + 1) % 4;
            };

            // Play the 4-note sequence
            playNote();
            setTimeout(playNote, 90);
            setTimeout(playNote, 180);
            setTimeout(playNote, 270);
        }

        // === SHOOTING SOUND ===
        function playShootSound() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.value = 920;
            gain.gain.value = 0.2;

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();

            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.stop(audioCtx.currentTime + 0.12);
        }

        // === UFO SOUND (already good) ===
        function playUfoSound() {
            initAudio();
            if (ufoOsc) ufoOsc.stop();

            ufoOsc = audioCtx.createOscillator();
            ufoGain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            ufoOsc.type = 'sawtooth';
            ufoOsc.frequency.value = 520;
            ufoGain.gain.value = 0.09;
            filter.type = 'lowpass';
            filter.frequency.value = 1400;

            ufoOsc.connect(filter);
            filter.connect(ufoGain);
            ufoGain.connect(audioCtx.destination);
            ufoOsc.start();

            let baseFreq = 520;
            const interval = setInterval(() => {
                if (!ufo || !ufoOsc) {
                    clearInterval(interval);
                    return;
                }
                const warble = Math.sin(Date.now() / 70) * 160;
                ufoOsc.frequency.value = baseFreq + warble;
            }, 45);
        }

        function stopUfoSound() {
            if (ufoGain) ufoGain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            if (ufoOsc) ufoOsc.stop(audioCtx.currentTime + 0.4);
            ufoOsc = null;
            ufoGain = null;
        }

        function initInvaders() {
            invaders = [];
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 11; c++) {
                    invaders.push({
                        x: 90 + c * 52,
                        y: 85 + r * 38,
                        alive: true,
                        row: r
                    });
                }
            }
        }

        function initBunkers() {
            bunkers = [];
            [140, 300, 460, 620].forEach(x => {
                bunkers.push({ x, y: 420, width: 65, height: 42, health: 4 });
            });
        }

        function drawInvader(inv) {
            if (!inv.alive) return;

            const x = inv.x;
            const y = inv.y;
            const f = animFrame;

            if (inv.row === 0) ctx.fillStyle = '#0f0';
            else if (inv.row < 3) ctx.fillStyle = '#0ff';
            else ctx.fillStyle = '#f0f';

            if (inv.row === 0) {
                ctx.fillRect(x + 8, y + 4, 18, 20);
                ctx.fillRect(x + 4, y + 10, 26, 8);
                if (f === 0) {
                    ctx.fillRect(x + 2, y + 20, 6, 8);
                    ctx.fillRect(x + 26, y + 20, 6, 8);
                } else {
                    ctx.fillRect(x + 6, y + 20, 6, 8);
                    ctx.fillRect(x + 22, y + 20, 6, 8);
                }
            } else if (inv.row < 3) {
                ctx.fillRect(x + 6, y + 6, 22, 16);
                ctx.fillRect(x + 2, y + 10, 30, 8);
                if (f === 0) {
                    ctx.fillRect(x, y + 18, 8, 8);
                    ctx.fillRect(x + 26, y + 18, 8, 8);
                } else {
                    ctx.fillRect(x + 4, y + 18, 8, 8);
                    ctx.fillRect(x + 22, y + 18, 8, 8);
                }
            } else {
                ctx.fillRect(x + 4, y + 4, 26, 18);
                ctx.fillRect(x, y + 8, 34, 8);
                if (f === 0) {
                    ctx.fillRect(x + 2, y + 20, 8, 8);
                    ctx.fillRect(x + 24, y + 20, 8, 8);
                } else {
                    ctx.fillRect(x + 6, y + 20, 8, 8);
                    ctx.fillRect(x + 20, y + 20, 8, 8);
                }
            }
        }

        function drawPlayer() {
            ctx.fillStyle = '#0ff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillRect(player.x + 16, player.y - 8, 8, 10);
            ctx.fillRect(player.x - 4, player.y + 4, 10, 10);
            ctx.fillRect(player.x + player.width - 6, player.y + 4, 10, 10);
        }

        function drawBunker(b) {
            if (b.health <= 0) return;
            ctx.fillStyle = '#f44';
            ctx.fillRect(b.x, b.y, b.width, b.height);
            if (b.health < 4) ctx.fillStyle = '#000';
            if (b.health < 3) ctx.fillRect(b.x + 12, b.y + 8, 18, 20);
            if (b.health < 2) ctx.fillRect(b.x + 38, b.y + 10, 16, 18);
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 800, 600);

            if (gameState === 'start') {
                ctx.fillStyle = '#0f0';
                ctx.font = 'bold 40px monospace';
                ctx.fillText('SPACE INVADERS', 200, 220);
                ctx.font = '18px monospace';
                ctx.fillText('Press SPACE to start', 260, 300);
            } 
            else if (gameState === 'playing') {
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 16px monospace';
                ctx.fillText('SCORE<1>', 60, 30);
                ctx.fillText('HI-SCORE', 320, 30);
                ctx.fillText('SCORE<2>', 580, 30);

                ctx.fillStyle = '#fff';
                ctx.fillText(score.toString().padStart(4, '0'), 80, 50);

                bunkers.forEach(drawBunker);
                invaders.forEach(drawInvader);
                drawPlayer();

                if (ufo) {
                    ctx.fillStyle = '#ff0';
                    ctx.fillRect(ufo.x, ufo.y, 50, 18);
                    ctx.fillRect(ufo.x + 10, ufo.y - 6, 30, 8);
                }

                ctx.fillStyle = '#fff';
                bullets.forEach(b => ctx.fillRect(b.x, b.y, 3, 10));

                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 16px monospace';
                ctx.fillText(lives, 40, 580);
            }
        }

        function update() {
            if (gameState !== 'playing') return;

            const now = Date.now();

            // === INVADER MOVEMENT + MARCHING SOUND ===
            if (now - lastMove > 280) {
                let hitWall = false;
                const aliveCount = invaders.filter(i => i.alive).length;

                invaders.forEach(inv => {
                    if (inv.alive) {
                        inv.x += dir * 8;
                        if (inv.x < 30 || inv.x > 720) hitWall = true;
                    }
                });

                if (hitWall) {
                    dir *= -1;
                    invaders.forEach(inv => { if (inv.alive) inv.y += 18; });
                }

                lastMove = now;
                animFrame = 1 - animFrame;

                // Play marching sound (speed increases as invaders die)
                playMarchSound();
                
                // Make marching faster when fewer invaders remain
                if (aliveCount < 20) lastMove = now - 80;
                if (aliveCount < 10) lastMove = now - 150;
            }

            // UFO spawning
            if (!ufo && now - lastUfoSpawn > 20000) {
                ufo = { x: -60, y: 55 };
                lastUfoSpawn = now;
                playUfoSound();
            }

            if (ufo) {
                ufo.x += 3.2;
                if (ufo.x > 860) {
                    ufo = null;
                    stopUfoSound();
                }
            }

            // Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= 12;
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }

            // Collisions
            for (let i = 0; i < invaders.length; i++) {
                const inv = invaders[i];
                if (!inv.alive) continue;

                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (b.x > inv.x && b.x < inv.x + 34 && b.y > inv.y && b.y < inv.y + 26) {
                        inv.alive = false;
                        bullets.splice(j, 1);
                        score += (inv.row === 0 ? 30 : inv.row < 3 ? 20 : 10);
                        break;
                    }
                }
            }

            // UFO hit
            if (ufo) {
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (b.x > ufo.x && b.x < ufo.x + 50 && b.y > ufo.y && b.y < ufo.y + 20) {
                        score += ufoScores[ufoScoreIndex % ufoScores.length];
                        ufoScoreIndex++;
                        bullets.splice(j, 1);
                        ufo = null;
                        stopUfoSound();
                        break;
                    }
                }
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function shoot() {
            bullets.push({ x: player.x + 18, y: player.y - 5 });
            playShootSound();
        }

        document.addEventListener('keydown', e => {
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'start') {
                    gameState = 'playing';
                    initInvaders();
                    initBunkers();
                    lastMove = Date.now();
                    lastUfoSpawn = Date.now();
                } else if (gameState === 'playing') {
                    shoot();
                }
            }

            if (gameState === 'playing') {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') player.x -= 14;
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') player.x += 14;
                player.x = Math.max(30, Math.min(730, player.x));
            }
        });

        // Boot
        initInvaders();
        initBunkers();
        draw();
        gameLoop();
    </script>
</body>
</html>
