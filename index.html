<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACE INVADERS • 1978</title>
    <style>
        body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; font-family: 'Press Start 2P', monospace; color:#0f0; }
        canvas { border:4px solid #0f0; box-shadow:0 0 40px #0f0; image-rendering:pixelated; }
        #ui { position:absolute; top:15px; width:800px; display:flex; justify-content:space-between; font-size:16px; text-shadow:0 0 8px #0f0; }
    </style>
</head>
<body>
    <div id="ui">
        <div>SCORE <span id="score">00000</span></div>
        <div>HIGH <span id="high">00000</span></div>
        <div>LIVES <span id="lives">3</span></div>
    </div>
    
    <canvas id="game" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let highScore = localStorage.getItem('siHighScore') || 0;
        let lives = 3;
        let gameState = 'start';
        let paused = false;

        const player = { x: 370, y: 520, width: 48, height: 24, speed: 6 };
        let playerBullet = null;
        let enemyBullets = [];
        let invaders = [];
        let bunkers = [];
        let ufo = null;

        let invaderDirection = 1;
        let invaderSpeed = 1.5;
        let lastMoveTime = 0;
        let moveDelay = 600;
        let frame = 0;

        let keys = {};
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playShoot() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = 880;
            gain.gain.value = 0.25;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playExplosion() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 120;
            gain.gain.value = 0.4;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.stop(audioCtx.currentTime + 0.6);
        }

        function initInvaders() {
            invaders = [];
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 11; col++) {
                    invaders.push({
                        x: 70 + col * 55,
                        y: 70 + row * 45,
                        width: 36,
                        height: 28,
                        alive: true,
                        row: row,
                        type: row === 0 ? 'squid' : row < 3 ? 'crab' : 'octopus'
                    });
                }
            }
        }

        function initBunkers() {
            bunkers = [];
            [120, 280, 440, 600].forEach(x => {
                bunkers.push({ x, y: 440, width: 80, height: 50, health: 4 });
            });
        }

        function updateInvaders() {
            const now = Date.now();
            if (now - lastMoveTime < moveDelay) return;

            const aliveInvaders = invaders.filter(i => i.alive);
            if (aliveInvaders.length === 0) {
                initInvaders();
                invaderSpeed = Math.min(5, invaderSpeed + 0.5);
                moveDelay = Math.max(80, moveDelay
